<div class="app-shell">
  <app-sidebar></app-sidebar>
  <div class="main-content">
    <app-topbar></app-topbar>
    <div class="page-body">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container">
  @for (t of toast.toasts(); track t.id) {
    <div class="toast" [class]="t.type">{{ t.message }}</div>
  }
</div>
